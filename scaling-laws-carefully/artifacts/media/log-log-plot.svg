<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" role="img" aria-labelledby="title desc">
  <title id="title">Normal plot versus log-log plot</title>
  <desc id="desc">A visual comparison showing that a curved power-law relationship on normal axes becomes a straight line when both axes use logarithmic spacing.</desc>
  <rect width="920" height="430" fill="#fbfaf7"/>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1d2428; }
    .small { font-size: 15px; }
    .label { font-size: 18px; font-weight: 700; }
    .tick { stroke: #97a1a8; stroke-width: 1; }
    .axis { stroke: #293238; stroke-width: 2; }
    .grid { stroke: #d8ddd9; stroke-width: 1; }
    .curve { fill: none; stroke: #2e7d6b; stroke-width: 4; }
    .line { fill: none; stroke: #c4513f; stroke-width: 4; }
    .dot { fill: #1d2428; }
  </style>

  <text x="240" y="42" text-anchor="middle" class="label">Normal plot</text>
  <text x="690" y="42" text-anchor="middle" class="label">Log-log plot</text>

  <line x1="80" y1="350" x2="390" y2="350" class="axis"/>
  <line x1="80" y1="350" x2="80" y2="70" class="axis"/>
  <text x="235" y="392" text-anchor="middle" class="small">input size: 1, 10, 100, 1000</text>
  <text x="28" y="215" text-anchor="middle" class="small" transform="rotate(-90 28 215)">output</text>
  <path d="M88 342 C140 302 182 244 218 190 C262 125 315 87 382 75" class="curve"/>
  <circle cx="96" cy="338" r="4" class="dot"/>
  <circle cx="151" cy="288" r="4" class="dot"/>
  <circle cx="245" cy="150" r="4" class="dot"/>
  <circle cx="376" cy="78" r="4" class="dot"/>
  <text x="235" y="374" text-anchor="middle" class="small">Big values crowd the right side</text>

  <line x1="530" y1="350" x2="840" y2="350" class="axis"/>
  <line x1="530" y1="350" x2="530" y2="70" class="axis"/>
  <line x1="530" y1="350" x2="530" y2="70" class="grid"/>
  <line x1="633" y1="350" x2="633" y2="70" class="grid"/>
  <line x1="736" y1="350" x2="736" y2="70" class="grid"/>
  <line x1="839" y1="350" x2="839" y2="70" class="grid"/>
  <line x1="530" y1="350" x2="840" y2="350" class="grid"/>
  <line x1="530" y1="257" x2="840" y2="257" class="grid"/>
  <line x1="530" y1="164" x2="840" y2="164" class="grid"/>
  <line x1="530" y1="71" x2="840" y2="71" class="grid"/>
  <path d="M540 330 L830 85" class="line"/>
  <circle cx="540" cy="330" r="4" class="dot"/>
  <circle cx="633" cy="251" r="4" class="dot"/>
  <circle cx="736" cy="164" r="4" class="dot"/>
  <circle cx="830" cy="85" r="4" class="dot"/>

  <text x="530" y="374" text-anchor="middle" class="small">1</text>
  <text x="633" y="374" text-anchor="middle" class="small">10</text>
  <text x="736" y="374" text-anchor="middle" class="small">100</text>
  <text x="839" y="374" text-anchor="middle" class="small">1000</text>
  <text x="684" y="392" text-anchor="middle" class="small">Same distance = multiply by 10</text>
  <text x="494" y="354" text-anchor="end" class="small">1</text>
  <text x="494" y="261" text-anchor="end" class="small">10</text>
  <text x="494" y="168" text-anchor="end" class="small">100</text>
  <text x="494" y="75" text-anchor="end" class="small">1000</text>

  <text x="460" y="408" text-anchor="middle" class="small">A log-log plot changes the ruler, not the data.</text>
</svg>
